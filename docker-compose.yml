services:
  frontend:
    image: node:22-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "5174:5174"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_ENV: local
      CORS_ORIGINS: http://localhost:5174,http://127.0.0.1:5174
      DATABASE_URL: postgresql+psycopg://safeway:safeway@postgres:5432/safeway
      USE_DATABASE: "true"
      DB_ECHO: "false"
      REDIS_URL: redis://redis:6379/0
      SAFEWAY_REPO_ROOT: /app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: safeway
      POSTGRES_USER: safeway
      POSTGRES_PASSWORD: safeway
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  frontend_node_modules:
  postgres_data:
  redis_data:
