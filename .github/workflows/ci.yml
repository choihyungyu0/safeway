name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    name: Typecheck, lint, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install frontend dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run TypeScript typecheck
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint

      - name: Run frontend tests
        run: npm run test

      - name: Build frontend
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then
            python -m pip install -r backend/requirements.txt
          else
            echo "backend/requirements.txt not found; skipping backend dependency install."
          fi

      - name: Compile backend Python
        run: python -m compileall backend/app

      - name: Run backend pytest if available
        working-directory: backend
        run: |
          if python -c "import pytest" 2>/dev/null; then
            python -m pytest
          else
            echo "pytest is not available; skipping backend pytest."
          fi
